    <strong>Same value repeat ஆனா — count மட்டும் store பண்ணும்</strong><br><br>
    <div style="font-family:var(--font-mono);font-size:11px;line-height:2;color:var(--color-text-secondary)">
      Before: India, India, India, India, USA, USA, China...<br>
      After:  (India × 500000), (USA × 300000), (China × 200000)
    </div>
    <div style="margin-top:6px;font-size:11px;color:#3C3489">1M values → 3 entries மட்டும்! 99.9997% compression!</div>
  </div>
</div></div>
<div class="step" style="margin-top:8px"><div class="snum" style="background:#534AB7">2</div>
<div style="flex:1">
  <div class="card" style="background:#EEEDFE;color:#3C3489;font-weight:500;margin-bottom:4px">Dictionary Encoding</div>
  <div class="card" style="background:var(--color-bg-secondary);color:var(--color-text-primary);margin-bottom:0">
    <strong>String values-ஐ numbers-ஆ மாத்தி store பண்ணும்</strong><br><br>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px">
      <div>Dictionary:<br><span style="font-family:var(--font-mono)">0 = "India"<br>1 = "USA"<br>2 = "China"</span></div>
      <div>Column data:<br><span style="font-family:var(--font-mono)">0,0,0,1,2,0,0,1...</span><br>(numbers &lt; strings!)</div>
    </div>
  </div>
</div></div>
<div class="divider"></div>
<table>
  <thead><tr><th>Column</th><th>Row Store size</th><th>Columnstore size</th><th>Compression ratio</th></tr></thead>
  <tbody>
    <tr style="background:#EEEDFE40"><td style="font-weight:500">Country (3 values)</td><td style="font-family:var(--font-mono)">8 MB</td><td style="font-family:var(--font-mono);color:#27500A;font-weight:500">0.01 MB</td><td><span class="pill" style="background:#EAF3DE;color:#27500A">800x smaller!</span></td></tr>
    <tr><td style="font-weight:500">Score (0–100)</td><td style="font-family:var(--font-mono)">8 MB</td><td style="font-family:var(--font-mono);color:#27500A;font-weight:500">1.5 MB</td><td><span class="pill" style="background:#EAF3DE;color:#27500A">5x smaller</span></td></tr>
    <tr style="background:#EEEDFE40"><td style="font-weight:500">CustomerID (unique)</td><td style="font-family:var(--font-mono)">8 MB</td><td style="font-family:var(--font-mono);color:#3C3489;font-weight:500">4 MB</td><td><span class="pill" style="background:#EEEDFE;color:#3C3489">2x smaller</span></td></tr>
    <tr><td style="font-weight:500">Name (varied)</td><td style="font-family:var(--font-mono)">50 MB</td><td style="font-family:var(--font-mono);color:#3C3489;font-weight:500">15 MB</td><td><span class="pill" style="background:#EEEDFE;color:#3C3489">3x smaller</span></td></tr>
  </tbody>
</table>`,

// STEP 4 — Syntax & Types
`<div class="card" style="background:#EEEDFE;color:#3C3489;margin-bottom:1rem">
  <strong>Columnstore Index types & CREATE syntax</strong>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
  <div>
    <div class="card" style="background:#EEEDFE;color:#3C3489;font-weight:500">Clustered Columnstore Index</div>
    <div style="background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:.75rem;font-family:var(--font-mono);font-size:11px;color:var(--color-text-primary);margin-bottom:8px;line-height:1.8">
      <span style="color:#A32D2D">CREATE</span> <span style="color:#534AB7">CLUSTERED</span><br>
      COLUMNSTORE INDEX CCI_Sales<br>
      <span style="color:#A32D2D">ON</span> Sales;
    </div>
    <div class="card" style="background:#EEEDFE;color:#3C3489;font-size:11px;margin-bottom:0">Table-ஓட primary storage format-ஐயே columnstore-ஆ மாத்தும். எல்லா columns-உம். Table-க்கு 1 மட்டும்.</div>
  </div>
  <div>
    <div class="card" style="background:#E1F5EE;color:#085041;font-weight:500">Non-Clustered Columnstore Index</div>
    <div style="background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:.75rem;font-family:var(--font-mono);font-size:11px;color:var(--color-text-primary);margin-bottom:8px;line-height:1.8">
      <span style="color:#A32D2D">CREATE</span> NONCLUSTERED<br>
      COLUMNSTORE INDEX NCCI_Sales<br>
      <span style="color:#A32D2D">ON</span> Sales<br>
      (OrderDate, Amount, Region);
    </div>
    <div class="card" style="background:#E1F5EE;color:#085041;font-size:11px;margin-bottom:0">Row store table-ல வேற. Specific columns மட்டும். OLTP + Analytics mixed workload-க்கு.</div>
  </div>
</div>
<table>
  <thead><tr><th></th><th style="background:#EEEDFE;color:#3C3489">Clustered Columnstore</th><th style="background:#E1F5EE;color:#085041">Non-Clustered Columnstore</th></tr></thead>
  <tbody>
    <tr><td>Storage</td><td>Table IS columnstore</td><td>Separate columnstore structure</td></tr>
    <tr style="background:var(--color-bg-secondary)"><td>Columns</td><td>All columns</td><td>Specific columns only</td></tr>
    <tr><td>Updatable?</td><td style="color:#27500A">SQL 2014+ — Yes</td><td style="color:#27500A">Yes</td></tr>
    <tr style="background:var(--color-bg-secondary)"><td>Per table</td><td>1 only</td><td>Multiple allowed</td></tr>
    <tr><td>Best for</td><td>Pure analytics (DWH)</td><td>Mixed OLTP + Analytics</td></tr>
  </tbody>
</table>`,

// STEP 5 — When to use
`<div class="card" style="background:#EEEDFE;color:#3C3489;margin-bottom:1rem">
  <strong>எப்போ Columnstore use பண்ணணும்? எப்போ வேண்டாம்?</strong>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
  <div>
    <div class="card" style="background:#EAF3DE;color:#27500A;font-weight:500">Use பண்ணு ✓</div>
    <div class="step"><div class="snum" style="background:#27500A">1</div>
    <div class="card" style="background:#EAF3DE;color:#27500A;flex:1;margin-bottom:0"><strong>Analytics / Aggregation</strong><br>SUM, AVG, COUNT, GROUP BY — millions of rows-ல fast!</div></div>
    <div class="step"><div class="snum" style="background:#27500A">2</div>
    <div class="card" style="background:#EAF3DE;color:#27500A;flex:1;margin-bottom:0"><strong>Data Warehouse / Reporting</strong><br>Monthly sales, yearly trends — perfect fit!</div></div>
    <div class="step"><div class="snum" style="background:#27500A">3</div>
    <div class="card" style="background:#EAF3DE;color:#27500A;flex:1;margin-bottom:0"><strong>Large tables (millions of rows)</strong><br>Row count அதிகமா இருந்தா compression benefit அதிகம்.</div></div>
    <div class="step"><div class="snum" style="background:#27500A">4</div>
    <div class="card" style="background:#EAF3DE;color:#27500A;flex:1;margin-bottom:0"><strong>Few columns needed</strong><br>SELECT Score, Country — 2 columns மட்டும் read.</div></div>
  </div>
  <div>
    <div class="card" style="background:#FCEBEB;color:#791F1F;font-weight:500">Use பண்ணாதே ✗</div>
    <div class="step"><div class="snum" style="background:#A32D2D">1</div>
    <div class="card" style="background:#FCEBEB;color:#791F1F;flex:1;margin-bottom:0"><strong>OLTP (frequent single row ops)</strong><br>INSERT/UPDATE/DELETE per row — slow! Delta store overhead.</div></div>
    <div class="step"><div class="snum" style="background:#A32D2D">2</div>
    <div class="card" style="background:#FCEBEB;color:#791F1F;flex:1;margin-bottom:0"><strong>Point lookups</strong><br>WHERE CustomerID = 5001 — single row. B-Tree faster.</div></div>
    <div class="step"><div class="snum" style="background:#A32D2D">3</div>
    <div class="card" style="background:#FCEBEB;color:#791F1F;flex:1;margin-bottom:0"><strong>Small tables</strong><br>100–1000 rows — compression benefit இல்ல. Overhead waste.</div></div>
    <div class="step"><div class="snum" style="background:#A32D2D">4</div>
    <div class="card" style="background:#FCEBEB;color:#791F1F;flex:1;margin-bottom:0"><strong>SELECT * queries</strong><br>எல்லா columns-உம் வேணும்னா row store better.</div></div>
  </div>
</div>`,

// STEP 6 — B-Tree vs Columnstore
`<div class="card" style="background:#EEEDFE;color:#3C3489;margin-bottom:1rem">
  <strong>B-Tree Index vs Columnstore Index — Complete comparison</strong>
</div>
<table style="margin-bottom:1rem">
  <thead><tr>
    <th>Feature</th>
    <th style="background:#E6F1FB;color:#0C447C">B-Tree Index (NCI/CI)</th>
    <th style="background:#EEEDFE;color:#3C3489">Columnstore Index</th>
  </tr></thead>
  <tbody>
    <tr><td>Storage format</td><td>Row-by-row (pages)</td><td style="color:#3C3489;font-weight:500">Column-by-column (segments)</td></tr>
    <tr style="background:var(--color-bg-secondary)"><td>Structure</td><td>B-Tree (Root→Inter→Leaf)</td><td style="color:#3C3489;font-weight:500">Rowgroups → Column Segments</td></tr>
    <tr><td>Compression</td><td>Row compression (~2x)</td><td style="color:#27500A;font-weight:500">Column compression (~10x)</td></tr>
    <tr style="background:var(--color-bg-secondary)"><td>Analytics speed</td><td style="color:#A32D2D">Slow (reads all columns)</td><td style="color:#27500A;font-weight:500">10x–100x faster!</td></tr>
    <tr><td>Point lookup speed</td><td style="color:#27500A;font-weight:500">Fast (3 page reads)</td><td style="color:#A32D2D">Slow (no B-Tree)</td></tr>
    <tr style="background:var(--color-bg-secondary)"><td>INSERT/UPDATE/DELETE</td><td style="color:#27500A;font-weight:500">Fast</td><td style="color:#A32D2D">Slower (delta store)</td></tr>
    <tr><td>Best use case</td><td>OLTP — transactions</td><td style="color:#3C3489;font-weight:500">OLAP — analytics/reporting</td></tr>
    <tr style="background:var(--color-bg-secondary)"><td>Batch mode execution</td><td>இல்ல</td><td style="color:#27500A;font-weight:500">ஆமா — 64K rows at once</td></tr>
    <tr><td>Memory usage</td><td>Standard</td><td style="color:#27500A;font-weight:500">Lower (compressed data)</td></tr>
  </tbody>
</table>
<div class="card" style="background:#EEEDFE;color:#3C3489">
  <strong>Real world example:</strong><br>
  <code>SELECT Country, AVG(Score) FROM Customers GROUP BY Country</code><br><br>
  B-Tree: 5000 rows → 13 pages → all 4 columns → filter → group → slow<br>
  Columnstore: Country + Score segments மட்டும் → batch process → <strong>10x+ faster!</strong>
</div>`
];

const labels = ['1. Row vs Column','2. Rowgroup structure','3. Compression','4. Syntax & types','5. When to use','6. B-Tree vs Columnstore'];

const tb = document.getElementById('tbr');
labels.forEach((l,i) => {
  const b = document.createElement('button');
  b.className = 'tab' + (i===0?' on':'');
  b.textContent = l;
  b.onclick = () => {
    document.querySelectorAll('.tab').forEach((x,j) => x.classList.toggle('on', j===i));
    document.getElementById('content').innerHTML = steps[i];
  };
  tb.appendChild(b);
});
document.getElementById('content').innerHTML = steps[0];
</script>
