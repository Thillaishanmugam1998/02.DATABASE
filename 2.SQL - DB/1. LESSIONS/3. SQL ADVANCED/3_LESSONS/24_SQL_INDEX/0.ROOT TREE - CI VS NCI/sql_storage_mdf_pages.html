  --color-bg-tertiary:   #eeede8;

@media (prefers-color-scheme: dark) {

}
body {
  font-family: var(--font-sans);
  background: var(--color-bg);
  color: var(--color-text-primary);
  padding: 2rem;
  line-height: 1.5;
}
h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.tab {
  padding: 6px 13px; font-size: 12px;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: 20px; background: transparent;
  color: var(--color-text-secondary); cursor: pointer;
  white-space: nowrap; transition: all .2s;
}
.tab.on { background: #E6F1FB; color: #0C447C; border-color: #185FA5; font-weight: 500; }
.panel { display: none; }
.panel.on { display: block; }
table { border-collapse: collapse; width: 100%; font-size: 12px; }
th { padding: 7px 10px; background: var(--color-bg-secondary); border: 0.5px solid var(--color-border); color: var(--color-text-secondary); text-align: left; }
td { padding: 7px 10px; border: 0.5px solid var(--color-border); }
.card { border-radius: var(--radius-md); padding: .65rem 1rem; font-size: 12px; margin-bottom: 8px; line-height: 1.6; }
.pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.divider { height: 2px; background: var(--color-border); margin: 1rem 0; border-radius: 2px; }
.step { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; }
.snum { border-radius: 50%; width: 24px; height: 24px; min-width: 24px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #fff; }
code { font-size: 11px; background: var(--color-bg-secondary); padding: 1px 5px; border-radius: 4px; font-family: var(--font-mono); }
</style>
</head>
